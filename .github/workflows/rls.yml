name: RLS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rls:
    name: Supabase RLS isolation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase and apply migrations
        run: |
          supabase start
          supabase db reset

      - name: Export Supabase credentials
        run: |
          eval "$(supabase status -o env)"
          echo "SUPABASE_URL=${API_URL}" >> "$GITHUB_ENV"
          echo "SUPABASE_DB_URL=${DB_URL}" >> "$GITHUB_ENV"
          if [ -n "${ANON_KEY:-}" ] && [ -n "${SERVICE_ROLE_KEY:-}" ]; then
            echo "SUPABASE_ANON_KEY=${ANON_KEY}" >> "$GITHUB_ENV"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> "$GITHUB_ENV"
          else
            node scripts/rls-export-keys.mjs >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run RLS tests
        run: npm run test:rls
