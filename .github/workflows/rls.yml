name: RLS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rls:
    name: Supabase RLS isolation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.40.5

      - name: Start Supabase and apply migrations
        run: |
          supabase start
          supabase db reset

      - name: Export Supabase credentials
        run: |
          STATUS="$(supabase status -o json)"
          SUPABASE_URL="$(echo "$STATUS" | jq -r '.API_URL')"
          SUPABASE_ANON_KEY="$(echo "$STATUS" | jq -r '.ANON_KEY // empty')"
          SUPABASE_SERVICE_ROLE_KEY="$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY // empty')"
          if [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing API keys from supabase status; falling back to -o env" >&2
            eval "$(supabase status -o env)"
            SUPABASE_URL="${API_URL}"
            SUPABASE_ANON_KEY="${ANON_KEY:-$PUBLISHABLE_KEY}"
            if [ -n "${SERVICE_ROLE_KEY:-}" ]; then
              SUPABASE_SERVICE_ROLE_KEY="${SERVICE_ROLE_KEY}"
            elif [[ "${SECRET_KEY:-}" == sb_secret_* ]]; then
              SUPABASE_SERVICE_ROLE_KEY="${SECRET_KEY}"
            else
              SUPABASE_SERVICE_ROLE_KEY=""
            fi
          fi
          if [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Could not resolve Supabase API keys" >&2
            exit 1
          fi
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
          } >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run RLS tests
        run: npm run test:rls
