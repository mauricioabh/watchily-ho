name: RLS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rls:
    name: Supabase RLS isolation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start Supabase and apply migrations
        run: |
          supabase start
          supabase db reset

      - name: Export Supabase credentials
        run: |
          eval "$(supabase status -o env)"
          SUPABASE_URL="${API_URL}"
          if [ -n "${ANON_KEY:-}" ]; then
            SUPABASE_ANON_KEY="${ANON_KEY}"
          else
            SUPABASE_ANON_KEY="${PUBLISHABLE_KEY}"
          fi
          if [ -n "${SERVICE_ROLE_KEY:-}" ]; then
            SUPABASE_SERVICE_ROLE_KEY="${SERVICE_ROLE_KEY}"
          elif [[ "${SECRET_KEY:-}" == sb_secret_* ]]; then
            SUPABASE_SERVICE_ROLE_KEY="${SECRET_KEY}"
          else
            SUPABASE_SERVICE_ROLE_KEY="$(supabase status 2>/dev/null | awk -F'│' '/Secret/{gsub(/ /,"",$3); if ($3 ~ /^sb_secret_/) {print $3; exit}}')"
          fi
          if [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Could not resolve Supabase API keys" >&2
            supabase status || true
            exit 1
          fi
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
          } >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run RLS tests
        run: npm run test:rls
