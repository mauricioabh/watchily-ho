name: RLS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rls:
    name: Supabase RLS isolation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase and apply migrations
        run: |
          supabase start
          supabase db reset

      - name: Export Supabase credentials
        run: |
          eval "$(supabase status -o env)"
          # Local `supabase start` uses the well-known demo JWT secret; fixed keys avoid
          # CLI env drift (null JSON fields, storage hex mistaken for API secret).
          echo "SUPABASE_URL=${API_URL}" >> "$GITHUB_ENV"
          echo "SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQv8Hdp7fsxs3T8Y1_YbIg" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run RLS tests
        run: npm run test:rls
